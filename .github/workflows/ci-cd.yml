name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Build pyqlib wheel package
  build-qlib:
    name: Build PyQlib Wheel
    runs-on: ubuntu-latest
    steps:
      - name: Checkout qlib repository
        uses: actions/checkout@v4
        with:
          repository: ytfei/qlib
          ref: fintech

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install build wheel

      - name: Build pyqlib wheel
        run: |
          python -m build --wheel --outdir dist/
          ls -lh dist/

      - name: Upload pyqlib wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: pyqlib-wheel-fintech
          path: dist/pyqlib-*.whl
          retention-days: 7

  # Build Docker image for testing
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: build-qlib
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download pyqlib wheel artifact
        uses: actions/download-artifact@v4
        with:
          name: pyqlib-wheel-fintech
          path: .

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (test only)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: ${{ env.IMAGE_NAME }}:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  # Test job
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          uv sync

      - name: Run configuration test
        run: |
          uv run python scripts/test_config.py || echo "Config test not available"
        continue-on-error: true

  # Deploy - only on main branch
  deploy:
    name: Deploy Docker Image
    runs-on: ubuntu-latest
    needs: [build, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download pyqlib wheel artifact
        uses: actions/download-artifact@v4
        with:
          name: pyqlib-wheel-fintech
          path: .

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Image digest
        run: echo "Image pushed with digest ${{ steps.build.outputs.digest }}"
