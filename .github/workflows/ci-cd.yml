name: Build Fin-Qlib Docker image

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Build pyqlib wheel package
  build-qlib:
    name: Build PyQlib Wheel
    runs-on: ubuntu-latest
    steps:
      - name: Checkout qlib repository
        uses: actions/checkout@v4
        with:
          repository: ytfei/qlib
          ref: fintech

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install build wheel

      - name: Build pyqlib wheel
        run: |
          python -m build --wheel --outdir dist/
          ls -lh dist/

      - name: Upload pyqlib wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: pyqlib-wheel-fintech
          path: dist/pyqlib-*.whl
          retention-days: 7

  # Build Docker image for testing
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: build-qlib
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download pyqlib wheel artifact
        uses: actions/download-artifact@v4
        with:
          name: pyqlib-wheel-fintech
          path: .

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set image tags
        id: set_tags
        run: |
          # 镜像名格式：自建仓库地址/项目名/镜像名:标签
          IMAGE_NAME="${{ secrets.DOCKER_REGISTRY }}/fin-proj/fin-qlib"
          # 标签1：提交的短哈希（如 abc1234）
          TAG_SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          # 标签2：latest（可选）
          echo "tags=${IMAGE_NAME}:${TAG_SHORT_SHA},${IMAGE_NAME}:latest" >> $GITHUB_OUTPUT

      - name: Build Docker image (test only)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: ${{ steps.set_tags.outputs.tags }}  # 使用步骤2生成的标签
          # 可选：启用构建缓存，加速后续构建
          cache-from: type=registry,ref=${{ secrets.DOCKER_REGISTRY }}/fin-proj/fin-qlib:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_REGISTRY }}/fin-proj/fin-qlib:buildcache,mode=max
          platforms: linux/amd64

  # Deploy - only on main branch
  deploy:
    name: Deploy Docker Image
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download pyqlib wheel artifact
        uses: actions/download-artifact@v4
        with:
          name: pyqlib-wheel-fintech
          path: .

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set image tags
        id: set_tags
        run: |
          # 镜像名格式：自建仓库地址/项目名/镜像名:标签
          IMAGE_NAME="${{ secrets.DOCKER_REGISTRY }}/fin-proj/fin-qlib"
          # 标签1：提交的短哈希（如 abc1234）
          TAG_SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          # 标签2：latest（可选）
          echo "tags=${IMAGE_NAME}:${TAG_SHORT_SHA},${IMAGE_NAME}:latest" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image (test only)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.set_tags.outputs.tags }}  # 使用步骤2生成的标签
          # 可选：启用构建缓存，加速后续构建
          cache-from: type=registry,ref=${{ secrets.DOCKER_REGISTRY }}/fin-proj/fin-qlib:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_REGISTRY }}/fin-proj/fin-qlib:buildcache,mode=max
          platforms: linux/amd64

      - name: Image digest
        run: echo "Image pushed with digest ${{ steps.build.outputs.digest }}"
