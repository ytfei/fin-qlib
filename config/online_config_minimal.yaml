# Minimal Configuration for Quick Testing
# This config uses minimal data and simple settings for fast validation

online_manager:
  # Path to save/load manager checkpoint
  manager_path: "data/checkpoints/online_manager_minimal.pkl"

  # Initial begin time (None for latest)
  begin_time: null

  # Data frequency (day, minute, etc.)
  freq: "day"

  # Trainer configuration
  trainer:
    type: "TrainerR"

  # Strategy definitions - Single simple strategy
  strategies:
    # Minimal LightGBM strategy for testing
    - name: "LGB_Minimal_Test"
      enabled: true
      type: "RollingStrategy"

      task_template:
        model:
          class: "LGBModel"
          module_path: "qlib.contrib.model.gbdt"
          kwargs:
            loss: "mse"
            colsample_bytree: 0.8
            learning_rate: 0.05
            subsample: 0.8
            max_depth: 6
            num_leaves: 64
            num_threads: 4

        dataset:
          class: "DatasetH"
          module_path: "qlib.data.dataset"
          kwargs:
            handler:
              class: "Alpha158"
              module_path: "qlib.contrib.data.handler"

            # Minimal data segments - adjust based on your actual data
            # IMPORTANT: Check your data range first with: python scripts/simple_data_check.py
            segments:
              train: [2022-01-01, 2022-12-31]  # 1 year training
              valid: [2023-01-01, 2023-06-30]  # 6 months validation
              test: [2023-07-01, 2023-12-31]   # 6 months test

        # Minimal recorder configuration
        record:
          - class: SignalRecord
            module_path: qlib.workflow.record_temp
            kwargs:
              model: <MODEL>
              dataset: <DATASET>

      # Minimal rolling configuration
      rolling_config:
        step: 365  # Roll once per year (minimal rolling)
        rtype: "ROLL_SD"

  # Signal configuration
  signal_config:
    ensemble_method: "average"  # Simple averaging

  # Signal export configuration
  signal_export:
    enabled: true
    dir: "data/signals"
    format: "csv"
    export_latest: true

# Qlib initialization configuration
qlib_config:
  # Data provider URI - Adjust to your actual data path
  provider_uri: "~/.qlib/qlib_data/cn_data"

  # Region: cn, us, etc.
  region: "cn"

  # MLflow tracking URI (optional)
  mlflow_tracking_uri: null

  # MongoDB configuration (optional)
  mongo:
    enabled: false  # Disabled for minimal test

  # Redis configuration (optional, for caching)
  redis:
    enabled: false

  exp_manager:
    enabled: true
    class: MLflowExpManager
    module_path: qlib.workflow.expm
    kwargs:
        uri: sqlite:///data/mlflow.db
        default_exp_name: Experiment
